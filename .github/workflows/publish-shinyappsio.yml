
name: shinyapps-publish

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to shinyapps.io
    if: "!contains(github.event.head_commit.message, '[automated]') &&!contains(github.event.head_commit.message, '[no-deploy]')"
    runs-on: ubuntu-latest

    env:
      # make renv faster and non-interactive
      RENV_CONFIG_CACHE_ENABLED: "TRUE"
      RSPM: "https://packagemanager.posit.co/cran/__linux__/jammy/latest"

    steps:
      - uses: actions/checkout@v6

      - name: Create.Renviron
        run: |
          cat >.Renviron <<'EOF'
          # ---- project settings ----
          RENV_CONFIG_PPM_SNAPSHOT=FALSE

          # ---- app secrets ----
          AUTH0_USER=${{ secrets.AUTH0_USER }}
          AUTH0_KEY=${{ secrets.AUTH0_KEY }}
          AUTH0_SECRET=${{ secrets.AUTH0_SECRET }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}
          DB_PORT=${{ secrets.DB_PORT }}

          # ---- rsconnect (optional, if you read from Sys.getenv) ----
          CONNECT_SERVER=${{ secrets.CONNECT_SERVER }}
          EOF

      - name: Setup R 4.4.3
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.3'
          use-public-rspm: true

      # Note: This step doesn't install pandoc
      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev libssl-dev libcurl4-openssl-dev libxml2-dev zlib1g-dev unixodbc unixodbc-dev pandoc

      - name: Setup renv
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1.1.2

      - name: Restore packages
        run: Rscript -e 'renv::restore(prompt = FALSE)'

      - name: Deploy to shinyapps.io
        env:
          SHINYAPPS_ACCOUNT: ${{ secrets.SHINYAPPS_ACCOUNT }}
          SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
          SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
          
        run: Rscript deploy.R